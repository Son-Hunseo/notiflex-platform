prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 5m
        memory: 256Mi
    retention: 6h

grafana:
  resources:
    requests:
      cpu: 5m
      memory: 128Mi
  persistence:
    enabled: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 5m
        memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 5m
      memory: 64Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

nodeExporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
